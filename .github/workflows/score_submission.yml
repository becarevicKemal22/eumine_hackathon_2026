name: Score Submission

on:
  pull_request:
    paths:
      - 'submissions/**/predictions_test.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find submission file
        id: find
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          FILES=$(git diff --name-only $BASE $HEAD \
            | grep 'submissions/.*/predictions_test.json' \
            | head -1)

          if [ -z "$FILES" ]; then
            echo "No predictions_test.json found in this PR."
            exit 1
          fi

          echo "pred_file=$FILES" >> $GITHUB_OUTPUT

          TEAM=$(echo "$FILES" | cut -d'/' -f2)
          echo "team=$TEAM" >> $GITHUB_OUTPUT

      - name: Decode test labels
        run: |
          echo "${{ secrets.TEST_LABELS_B64 }}" | base64 -d > /tmp/test_labels.json

          python -c "
import json
d = json.load(open('/tmp/test_labels.json'))
print(f'Labels loaded: {len(d[\"labels\"])} entries')
"

      - name: Run scoring
        run: |
          mkdir -p /tmp/input/res /tmp/input/ref /tmp/output

          cp "${{ steps.find.outputs.pred_file }}" /tmp/input/res/predictions_test.json
          cp /tmp/test_labels.json /tmp/input/ref/test_labels.json

          python scoring/evaluate.py /tmp/input /tmp/output

          echo "SCORES=$(cat /tmp/output/scores.json)" >> $GITHUB_ENV

      - name: Post score as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const s = JSON.parse(process.env.SCORES);
            const team = "${{ steps.find.outputs.team }}";

            const baseline = 20.0;
            const beat = s.performance_score > baseline
              ? "✅ beats baseline"
              : "⚠ below baseline";

            const body = [
              `## Submission Score — ${team}`,
              "",
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Performance Score** | **${s.performance_score} / 40** |`,
              `| MAE Formation Energy | ${s.mae_formation_energy} eV/atom |`,
              `| MAE Band Gap | ${s.mae_band_gap} eV |`,
              `| Score EF | ${s.score_formation_energy} / 20 |`,
              `| Score BG | ${s.score_band_gap} / 20 |`,
              `| Missing materials | ${s.n_missing} |`,
              "",
              beat,
              "",
              `_Baseline = 20.0 pts. Perfect = 40.0 pts._`
            ].join("\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
